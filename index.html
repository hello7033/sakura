<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本東京 5D4N - 雲端同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        
        /* 避免 Vue 掛載前的閃爍 */
        [v-cloak] { display: none !important; }
        
        #app-loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff5f6;
            z-index: 9999;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: linear-gradient(180deg, #fff5f6 0%, #ffffff 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: #5c5c5c;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.9);
        }

        .sakura-header { 
            background: linear-gradient(135deg, rgba(255, 241, 242, 0.9) 0%, rgba(255, 255, 255, 0.6) 100%); 
        }

        @keyframes sakura-fall {
            0% { transform: translate(0, -10%) rotateX(0deg) rotateY(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translate(200px, 110vh) rotateX(720deg) rotateY(360deg); opacity: 0; }
        }

        .sakura-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
            perspective: 1200px;
        }

        .petal {
            position: absolute;
            background: linear-gradient(135deg, #ffd1dc 0%, #fff 100%);
            border-radius: 100% 0 100% 0;
            opacity: 0;
            animation: sakura-fall linear infinite;
            transform-style: preserve-3d;
            box-shadow: 0 2px 5px rgba(255, 182, 193, 0.2);
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .text-soft-pink { color: #f2bac5; }
        .bg-soft-pink { background-color: #f2bac5; }

        .loading-dot { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
    </style>
</head>
<body class="pb-12">
    <!-- 預載入畫面 -->
    <div id="app-loading">
        <div class="text-center space-y-4">
            <div class="text-3xl animate-bounce">🌸</div>
            <div class="text-[10px] tracking-[0.3em] text-soft-pink font-bold">LOADING SYSTEM...</div>
        </div>
    </div>

    <!-- 櫻花背景 -->
    <div class="sakura-container" id="sakura-box"></div>

    <div id="app" v-cloak class="max-w-md mx-auto min-h-screen relative z-10">
        <!-- 雲端狀態提示 -->
        <div v-if="loading" class="fixed top-4 left-1/2 -translate-x-1/2 z-[110] bg-white/90 backdrop-blur px-4 py-1.5 rounded-full shadow-md border border-pink-50 text-[10px] text-soft-pink font-bold tracking-widest flex items-center gap-2">
            <span class="w-1.5 h-1.5 bg-soft-pink rounded-full loading-dot"></span>
            CLOUD SYNCING...
        </div>

        <header class="sakura-header p-10 text-slate-500 rounded-b-[4rem] relative overflow-hidden shadow-sm">
            <button @click="toggleLang" class="absolute top-8 right-8 text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-200 pb-0.5 z-20">
                {{ lang === 'zh' ? 'English' : '中文' }}
            </button>
            
            <div class="space-y-3 relative z-10">
                <p class="text-[10px] tracking-[0.4em] font-bold text-soft-pink uppercase">Tokyo Journey</p>
                <h1 class="text-3xl font-light tracking-tight text-slate-700">Spring <span class="italic font-serif">2026</span></h1>
                
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-2 text-[10px] font-medium text-slate-400 tracking-wider">
                        <i class="fa-solid fa-calendar-days text-[9px]"></i>
                        <span>APRIL 02 — APRIL 06</span>
                    </div>
                    <div class="flex items-center gap-2 text-[10px] font-bold text-white bg-soft-pink/80 px-3 py-1 rounded-full shadow-sm">
                        <i class="fa-solid fa-cloud-sun"></i>
                        <span>TOKYO 18°C</span>
                    </div>
                </div>
            </div>
        </header>

        <div class="mx-6 -mt-8 space-y-4 relative z-20">
            <!-- 狀態卡片 -->
            <section class="glass-panel rounded-[2.5rem] shadow-lg p-6 space-y-5">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-xl shadow-sm border border-pink-50">🌸</div>
                        <div>
                            <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Cloud Storage</div>
                            <div class="text-xs font-semibold text-slate-600">{{ user ? (lang === 'zh' ? '已連線' : 'Connected') : 'Connecting...' }}</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-[9px] text-slate-300 uppercase font-bold tracking-tighter">User ID</div>
                        <div class="text-[8px] text-slate-400 font-mono bg-white px-2 py-1 rounded-md border border-slate-50">{{ user?.uid ? user.uid.substring(0,8) : '...' }}</div>
                    </div>
                </div>

                <!-- 匯率轉換 -->
                <div class="pt-5 border-t border-slate-100">
                    <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-comments-dollar text-soft-pink"></i> {{ lang === 'zh' ? '匯率換算器' : 'Converter' }}
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div class="space-y-1.5">
                            <label class="text-[9px] font-bold text-slate-400 block ml-1 uppercase">Jpy</label>
                            <input type="number" v-model="currency.jpy" @input="convert('jpy')" class="w-full bg-white/80 border border-slate-100 rounded-xl py-2.5 px-3 text-sm font-medium text-slate-600 focus:outline-none">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[9px] font-bold text-slate-4
